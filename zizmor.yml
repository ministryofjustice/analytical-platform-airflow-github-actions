---
rules:
  unpinned-uses:
    config:
      policies:
        ministryofjustice/analytical-platform-airflow-github-actions/*: ref-pin

  template-injection:
    ignore:
      - .github/workflows/shared-scheduled-container-scan.yml:133
      - .github/workflows/shared-scheduled-container-scan.yml:136

  secrets-outside-env:
    ignore:
      - .github/workflows/shared-release-container.yml:145
