---
on:
  workflow_call:
    inputs:
      runtime:
        type: string
        required: true
      trivy_timeout:
        type: string
        required: false
        default: "15m0s"

permissions: {}

jobs:
  scan-container:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Octo STS
        id: octo_sts
        uses: ministryofjustice/analytical-platform-github-actions/octo-sts@8465086d84a8ae8fb993ef582f00cf13b8ceb9c8 # v7.1.0

      - name: Clean Actions Runner
        id: clean_actions_runner
        uses: ministryofjustice/action-clean-runner@390530713a326ddc099b2114f38dd0f2f8eac6da # v1.1.0
        with:
          confirm: true

      - name: Generate .trivyignore
        id: generate_trivyignore
        shell: bash
        env:
          RUNTIME: ${{ inputs.runtime }}
        run: |
          curl --silent --show-error --location "https://raw.githubusercontent.com/ministryofjustice/analytical-platform-airflow-${RUNTIME}-base/main/.trivyignore" --output "analytical-platform-airflow-${RUNTIME}-base-trivyignore"

          if [[ ! -f .trivyignore ]]; then
            mv "analytical-platform-airflow-${RUNTIME}-base-trivyignore" .trivyignore
          else
            cat "analytical-platform-airflow-${RUNTIME}-base-trivyignore" >> .trivyignore
          fi

      - name: Build
        id: build
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          push: false
          tags: ${{ github.sha }}

      - name: Install Trivy from S3
        id: install_trivy
        shell: bash
        run: |
          mkdir -p "$HOME/.local/bin"
          TRIVY_ARCHIVE="trivy_0.69.3_Linux-64bit.tar.gz"
          TRIVY_CHECKSUM_FILE="trivy_0.69.3_checksum.txt"
          aws s3 cp "s3://analytical-platform-shared-artifacts/trivy/${TRIVY_ARCHIVE}" "$HOME/.local/bin/${TRIVY_ARCHIVE}"
          aws s3 cp "s3://analytical-platform-shared-artifacts/trivy/${TRIVY_CHECKSUM_FILE}" "$HOME/.local/bin/${TRIVY_CHECKSUM_FILE}"

          (cd "$HOME/.local/bin" && grep " ${TRIVY_ARCHIVE}$" "${TRIVY_CHECKSUM_FILE}" | sha256sum --check --status)

          tar -xzf "$HOME/.local/bin/${TRIVY_ARCHIVE}" -C "$HOME/.local/bin" trivy
          chmod +x "$HOME/.local/bin/trivy"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/trivy" --version

      - name: Scan
        id: scan
        shell: bash
        env:
          TRIVY_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-db:2
          TRIVY_JAVA_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-java-db:1
          TRIVY_TIMEOUT: ${{ inputs.trivy_timeout }}
        run: |
          trivy image \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --vuln-type library \
            --timeout "$TRIVY_TIMEOUT" \
            --skip-dirs "/home/analyticalplatform/.cache/R" \
            --skip-dirs "/usr/local/lib/R/site-library/openssl/doc" \
            --exit-code 1 \
            "${{ github.sha }}"

      - name: Comment on Scan Success
        id: comment_on_scan_success
        if: steps.scan.outcome == 'success'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: 'Container scan has passed.'
            })

      - name: Comment on Scan Failure
        id: comment_on_scan_failure
        if: failure() && steps.scan.outcome == 'failure'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: 'Container scan has failed, please refer to the [User Guidance](https://user-guidance.analytical-platform.service.justice.gov.uk/services/airflow/index.html#vulnerability-scanning) for more information.'
            })
